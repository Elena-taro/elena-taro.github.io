<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>К ТАРО нежно — Елена | Узнай свой Аркан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #faf6f0;
            font-family: 'Inter', sans-serif;
            color: #2d3e2b;
            line-height: 1.4;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 20px 48px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d9e0b5;
        }
        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 600;
            color: #3b5a2f;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .channel {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7b8f6b;
            margin-bottom: 12px;
            font-weight: 400;
        }
        .slogan {
            font-size: 1.15rem;
            font-style: italic;
            color: #5c7452;
            background: #fff6ea;
            display: inline-block;
            padding: 8px 18px;
            border-radius: 60px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }

        .test-card {
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            background: #ffffff;
            border-radius: 36px;
            padding: 24px 20px 32px;
            box-shadow: 0 12px 28px rgba(50, 50, 30, 0.08);
            margin: 20px 0 28px;
            border: 1px solid #e1e9cf;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 500;
            font-family: 'Cormorant Garamond', serif;
            color: #2c4824;
            margin-bottom: 28px;
            line-height: 1.3;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 32px;
        }

        .option-btn {
            background: #f6f2e9;
            border: 1px solid #d4e0c2;
            border-radius: 100px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 500;
            color: #2d4528;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .option-btn:hover {
            background: #e3ecd4;
            border-color: #8daa7a;
            transform: translateX(6px);
        }

        .progress {
            font-size: 0.8rem;
            color: #8faa7a;
            margin-top: 12px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .result-area {
            background: #fefaf3;
            border-radius: 32px;
            padding: 28px 20px;
            margin-top: 24px;
            text-align: center;
            border-left: 6px solid #b3cf9b;
        }

        .arcan-name {
            font-size: 2rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            color: #3e672e;
            margin-bottom: 12px;
        }
        .arcan-desc {
            font-size: 1rem;
            color: #4a6042;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .reset-btn {
            background: transparent;
            border: 1px solid #bbd4a2;
            padding: 8px 20px;
            border-radius: 40px;
            color: #3b5a2f;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        .reset-btn:hover {
            background: #eef3e6;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 28px 0 24px;
        }
        .btn-telegram {
            background: #3e672e;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 48px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .btn-telegram:hover {
            background: #2c5420;
            transform: scale(1.01);
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #dfe6d2;
            font-size: 0.8rem;
            color: #8b9e79;
        }

        h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: #3b5a2f;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .small-note {
            font-size: 0.75rem;
            text-align: center;
            color: #b0c29a;
            margin-top: 8px;
        }

        @media (max-width: 550px) {
            .container {
                padding: 16px;
            }
            .question-text {
                font-size: 1.4rem;
            }
            .name {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="name">Елена</div>
        <div class="channel">К ТАРО нежно</div>
        <div class="slogan">🗝️ Вернуться к себе. Выбрать путь. Обрести опору.</div>
    </div>

    <h3>✨ Какой аркан ведёт тебя по жизни? ✨</h3>
    <div class="test-card" id="testApp">
        <div id="quizContainer"></div>
    </div>

    <div class="buttons">
        <a href="https://t.me/kTaro_nezhno" target="_blank" class="btn-telegram">📿 Записаться к Елене</a>
    </div>

    <div class="footer">
        Елена · К ТАРО нежно · мягкое таро для решений и любви 💚
    </div>
</div>

<script>
    const questions = [
        {
            text: "Что ты чувствуешь, когда стоишь на распутье?",
            options: [
                { text: "Лёгкое волнение и любопытство — всё равно куда идти, начну сначала", points: "fool" },
                { text: "Сердце подсказывает, но боюсь ошибиться в выборе", points: "lovers" },
                { text: "Готова разогнать сомнения и двигаться вперёд, несмотря ни на что", points: "chariot" },
                { text: "Верю, что Вселенная приведёт туда, где меня ждёт чудо", points: "star" }
            ]
        },
        {
            text: "Что для тебя сейчас важнее всего?",
            options: [
                { text: "Начать что-то новое, даже если это риск", points: "fool" },
                { text: "Найти гармонию в отношениях и понять, что действительно хочу рядом", points: "lovers" },
                { text: "Взять контроль над финансами и карьерой", points: "chariot" },
                { text: "Обрести внутреннюю надежду и исцеление", points: "star" }
            ]
        },
        {
            text: "Как ты обычно принимаешь сложные решения?",
            options: [
                { text: "Доверяюсь интуиции и порыву", points: "fool" },
                { text: "Слушаю и разум, и сердце, долго взвешиваю", points: "lovers" },
                { text: "Действую активно, с планом и упорством", points: "chariot" },
                { text: "Медитирую, прошу знак у вселенной", points: "star" }
            ]
        },
        {
            text: "Какая фраза отзывается тебе прямо сейчас?",
            options: [
                { text: "«Новый путь — это прыжок веры»", points: "fool" },
                { text: "«Любовь и выбор — две стороны одной тайны»", points: "lovers" },
                { text: "«Никто не остановит меня на пути к цели»", points: "chariot" },
                { text: "«Всё будет так, как задумано звёздами»", points: "star" }
            ]
        }
    ];

    const arcanResults = {
        fool: {
            name: "✨ Аркан — Шут (Дурак) ✨",
            description: "Ты в начале пути, полна доверия к жизни. Твоя стихия — чистый лист и свобода. Сейчас важнее всего сделать первый шаг, даже не зная расклада. Шут ведёт тебя через смелые эксперименты."
        },
        lovers: {
            name: "💞 Аркан — Влюблённые 💞",
            description: "Твоя жизнь направляется выбором сердца. Сейчас ключевое — честность с собой в отношениях и ценностях. Влюблённые помогают тебе соединить любовь и истинное предназначение."
        },
        chariot: {
            name: "🏹 Аркан — Колесница 🏹",
            description: "Ты рождена для движения и побед. Целеустремлённость и воля ведут тебя к деньгам и успеху. Колесница говорит — бери управление в свои руки, дорога откроется."
        },
        star: {
            name: "🌟 Аркан — Звезда 🌟",
            description: "Ты идёшь под светом надежды и вдохновения. Даже если сейчас нелегко — Звезда сулит исполнение самых заветных желаний. Доверяй потоку и чуду."
        }
    };

    let currentQuestionIndex = 0;
    let userPointsMap = { fool: 0, lovers: 0, chariot: 0, star: 0 };
    let quizActive = true;

    function getLeadingArcan() {
        let maxPoints = -1;
        let leading = "fool";
        for (let [key, value] of Object.entries(userPointsMap)) {
            if (value > maxPoints) {
                maxPoints = value;
                leading = key;
            }
        }
        return leading;
    }

    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        if (!quizActive && currentQuestionIndex >= questions.length) {
            const leading = getLeadingArcan();
            const result = arcanResults[leading];
            container.innerHTML = `
                <div class="result-area">
                    <div class="arcan-name">${result.name}</div>
                    <div class="arcan-desc">${result.description}</div>
                    <button class="reset-btn" id="restartTest">🔄 Пройти тест заново</button>
                    <div class="small-note" style="margin-top: 16px;">Твой ведущий аркан — подсказка от судьбы. Запишись к Елене на полный расклад ✨</div>
                </div>
            `;
            const restartBtn = document.getElementById('restartTest');
            if (restartBtn) {
                restartBtn.addEventListener('click', () => {
                    currentQuestionIndex = 0;
                    userPointsMap = { fool: 0, lovers: 0, chariot: 0, star: 0 };
                    quizActive = true;
                    renderQuiz();
                });
            }
            return;
        }

        if (currentQuestionIndex < questions.length) {
            const q = questions[currentQuestionIndex];
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `<button class="option-btn" data-points="${opt.points}">${opt.text}</button>`;
            });
            container.innerHTML = `
                <div class="question-text">${currentQuestionIndex+1}. ${q.text}</div>
                <div class="options" id="optionsList">
                    ${optionsHtml}
                </div>
                <div class="progress">вопрос ${currentQuestionIndex+1} из ${questions.length}</div>
            `;
            const optionBtns = document.querySelectorAll('.option-btn');
            optionBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const pointsType = btn.getAttribute('data-points');
                    if (pointsType && userPointsMap[pointsType] !== undefined) {
                        userPointsMap[pointsType] += 1;
                    }
                    currentQuestionIndex++;
                    if (currentQuestionIndex === questions.length) {
                        quizActive = false;
                    }
                    renderQuiz();
                });
            });
        }
    }

    renderQuiz();
</script>
</body>
</html>
