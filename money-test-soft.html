<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>К ТАРО нежно — Денежный тест | Елена</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #faf6f0;  /* кремовый фон */
            font-family: 'Inter', sans-serif;
            color: #2d3e2b;
            line-height: 1.4;
        }

        /* декоративные монетки */
        body::before {
            content: "💰";
            font-size: 130px;
            position: fixed;
            bottom: 10px;
            right: -20px;
            opacity: 0.05;
            pointer-events: none;
            transform: rotate(-10deg);
            z-index: 0;
        }
        body::after {
            content: "🪙";
            font-size: 90px;
            position: fixed;
            top: 80px;
            left: -20px;
            opacity: 0.05;
            pointer-events: none;
            transform: rotate(15deg);
            z-index: 0;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 20px 48px;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #d9e0b5;
        }
        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            font-weight: 600;
            color: #3b5a2f;
            letter-spacing: -0.5px;
        }
        .channel {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7b8f6b;
            margin: 6px 0 8px;
        }
        .test-title {
            font-size: 1.7rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            color: #c27e2c;
            background: #fff6ea;
            display: inline-block;
            padding: 8px 22px;
            border-radius: 60px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            margin-top: 6px;
        }

        .test-card {
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            background: #ffffff;
            border-radius: 36px;
            padding: 28px 22px 34px;
            box-shadow: 0 12px 28px rgba(50, 50, 30, 0.08);
            margin: 28px 0 28px;
            border: 1px solid #e1e9cf;
        }

        .question-text {
            font-size: 1.55rem;
            font-weight: 500;
            font-family: 'Cormorant Garamond', serif;
            color: #2c4824;
            margin-bottom: 28px;
            line-height: 1.3;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .option-btn {
            background: #f6f2e9;
            border: 1px solid #d4e0c2;
            border-radius: 100px;
            padding: 14px 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #2d4528;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .option-btn:hover {
            background: #e3ecd4;
            border-color: #8daa7a;
            transform: translateX(6px);
        }

        .progress {
            font-size: 0.8rem;
            color: #8faa7a;
            text-align: center;
            margin-top: 12px;
        }

        .result-area {
            background: #fefaf3;
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            border-left: 6px solid #b3cf9b;
            box-shadow: 0 6px 12px rgba(0,0,0,0.03);
        }

        .block-name {
            font-size: 1.7rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            color: #b47c2e;
            margin: 12px 0 10px;
        }
        .block-desc {
            font-size: 1rem;
            color: #4a6042;
            line-height: 1.45;
            margin-bottom: 24px;
        }
        .money-icon {
            font-size: 2.4rem;
            display: inline-block;
            margin-bottom: 6px;
        }
        .reset-btn {
            background: transparent;
            border: 1px solid #bbd4a2;
            padding: 8px 22px;
            border-radius: 40px;
            color: #3b5a2f;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
        }
        .reset-btn:hover {
            background: #eef3e6;
        }

        .buttons {
            display: flex;
            justify-content: center;
            margin: 20px 0 20px;
        }
        .btn-telegram {
            background: #3e672e;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 48px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .btn-telegram:hover {
            background: #2c5420;
            transform: scale(1.01);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #dfe6d2;
            font-size: 0.75rem;
            color: #8b9e79;
        }
        .coins-mini {
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-align: center;
            margin: 10px 0 5px;
            color: #d4b87a;
        }
        @media (max-width: 550px) {
            .question-text { font-size: 1.35rem; }
            .test-title { font-size: 1.4rem; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="name">Елена</div>
        <div class="channel">К ТАРО нежно</div>
        <div class="test-title">💰 Почему деньги уходят, а не приходят?</div>
        <div class="coins-mini">🪙 ✨ 💰 ✨ 🪙</div>
    </div>

    <div class="test-card" id="moneyTestApp">
        <div id="quizContainer"></div>
    </div>

    <div class="buttons">
        <a href="https://t.me/kTaro_nezhno" target="_blank" class="btn-telegram">✨ Получи разбор твоих отношений с деньгами ✨</a>
    </div>

    <div class="footer">
        Елена · К ТАРО нежно · возвращаю деньги в любовь и опору
    </div>
</div>

<script>
    const questions = [
        {
            text: "Как ты обычно реагируешь, когда приходят неожиданные деньги?",
            options: [
                { text: "Радуюсь и трачу сразу", points: "rod" },
                { text: "Откладываю, но потом срываюсь", points: "self" },
                { text: "Чувствую тревогу — «их всё равно не будет долго»", points: "fear" },
                { text: "Не замечаю, деньги проходят мимо", points: "rod" }
            ]
        },
        {
            text: "Что ты чувствуешь, когда видишь чужой успех или большой доход?",
            options: [
                { text: "Радость и вдохновение", points: "self" },
                { text: "Зависть и досаду", points: "self" },
                { text: "«У меня так не получится»", points: "self" },
                { text: "Безразличие", points: "fear" }
            ]
        },
        {
            text: "Какая фраза тебе ближе всего?",
            options: [
                { text: "«Деньги любят труд»", points: "rod" },
                { text: "«Большие деньги — большие проблемы»", points: "rod" },
                { text: "«Чтобы заработать, нужно рисковать»", points: "fear" },
                { text: "«Деньги приходят к тем, кто их достоин»", points: "self" }
            ]
        },
        {
            text: "Что происходит с деньгами в конце месяца?",
            options: [
                { text: "Всегда остаётся немного на сбережения", points: "self" },
                { text: "Едва хватает до зарплаты", points: "fear" },
                { text: "Уходят в долги / кредиты", points: "rod" },
                { text: "Не понимаю, куда они ушли", points: "rod" }
            ]
        }
    ];

    const blockResults = {
        rod: {
            name: "🌿 Родовые деньги 🌿",
            description: "Твой блок: родовые деньги. Кто-то в роду сказал: «Деньги — это тяжело». Пора снять этот груз. Мы работаем с родом, чтобы деньги потекли легко.",
            icon: "🪷"
        },
        self: {
            name: "🪞 Самооценка и ценность 🪞",
            description: "Твой блок: внутренний конфликт. Ты хочешь больше, но когда приходят деньги — сливаешь. Тело не привыкло к стабильности. Начнём поднимать твою истинную ценность.",
            icon: "💎"
        },
        fear: {
            name: "⚡ Страх больших денег ⚡",
            description: "Твой блок: потолок убеждений. Подсознание шепчет: «Нельзя больше определённой суммы». Пора расширить границы и разрешить себе изобилие.",
            icon: "🔓"
        }
    };

    let currentIndex = 0;
    let scores = { rod: 0, self: 0, fear: 0 };
    let quizActive = true;

    function getTopBlock() {
        let maxCount = -1;
        let top = "rod";
        for (let [key, val] of Object.entries(scores)) {
            if (val > maxCount) {
                maxCount = val;
                top = key;
            }
        }
        return top;
    }

    function render() {
        const container = document.getElementById('quizContainer');
        if (!quizActive && currentIndex >= questions.length) {
            const topKey = getTopBlock();
            const res = blockResults[topKey];
            container.innerHTML = `
                <div class="result-area">
                    <div class="money-icon">${res.icon} 🪙</div>
                    <div class="block-name">${res.name}</div>
                    <div class="block-desc">${res.description}</div>
                    <button class="reset-btn" id="restartTest">🔄 Пройти тест заново</button>
                    <div class="coins-mini" style="margin-top: 18px;">✨ чтобы убрать блок — начни с разбора</div>
                </div>
            `;
            const restart = document.getElementById('restartTest');
            if (restart) {
                restart.addEventListener('click', () => {
                    currentIndex = 0;
                    scores = { rod: 0, self: 0, fear: 0 };
                    quizActive = true;
                    render();
                });
            }
            return;
        }

        if (currentIndex < questions.length) {
            const q = questions[currentIndex];
            let optsHtml = "";
            q.options.forEach(opt => {
                optsHtml += `<button class="option-btn" data-points="${opt.points}">${opt.text}</button>`;
            });
            container.innerHTML = `
                <div class="question-text">${currentIndex+1}. ${q.text}</div>
                <div class="options" id="optionsList">
                    ${optsHtml}
                </div>
                <div class="progress">вопрос ${currentIndex+1} из ${questions.length}</div>
            `;
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const p = btn.getAttribute('data-points');
                    if (p && scores[p] !== undefined) scores[p] += 1;
                    currentIndex++;
                    if (currentIndex === questions.length) quizActive = false;
                    render();
                });
            });
        }
    }

    render();
</script>
</body>
</html>
